<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oferta - Comunidade Adventista da Mooca</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #e8f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 36px 28px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      text-align: center;
    }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #1a3c5e; margin-bottom: 8px; }
    .subtitle { color: #555; font-size: 15px; margin-bottom: 28px; line-height: 1.5; }
    .btn {
      background: #2e7d9b;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 16px 24px;
      font-size: 17px;
      font-weight: bold;
      width: 100%;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:active { background: #245f7a; }
    .status {
      margin-top: 20px;
      font-size: 13px;
      color: #888;
      min-height: 20px;
    }
    .spinner {
      display: none;
      margin: 16px auto 0;
      width: 30px;
      height: 30px;
      border: 3px solid #ddd;
      border-top-color: #2e7d9b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⛪</div>
    <h1>Comunidade Adventista da Mooca</h1>
    <p class="subtitle">Toque no botão abaixo para realizar sua oferta diretamente para a Comunidade Adventista da Mooca.</p>
    <button class="btn" id="btn" onclick="iniciar()">Fazer Oferta</button>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status"></div>
  </div>

  <script>
    const URL_BASE = 'https://giving.7me.app/guest-donation/church/9c0bce82-d272-469b-84fd-8e79d489864a';

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function iniciar() {
      document.getElementById('btn').disabled = true;
      document.getElementById('btn').textContent = 'Carregando...';
      document.getElementById('spinner').style.display = 'block';
      setStatus('Abrindo sistema de ofertas...');

      // Cria iframe invisível para tentar acessar o DOM
      const iframe = document.createElement('iframe');
      iframe.src = URL_BASE;
      iframe.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:9999;';
      iframe.id = 'frame7me';
      document.body.appendChild(iframe);

      document.getElementById('btn').style.display = 'none';
      document.querySelector('.card').style.display = 'none';

      let tentativa = 0;
      const MAX = 20;

      const loop = setInterval(() => {
        tentativa++;
        try {
          const doc = iframe.contentDocument || iframe.contentWindow.document;
          if (!doc || !doc.body || doc.body.innerHTML.length < 100) return;

          // Passo 1: abrir "Outras Ofertas"
          let clicouOutras = false;
          const categoryTitles = doc.querySelectorAll('span.category-title');
          categoryTitles.forEach(el => {
            if (el.innerText.trim() === 'Outras Ofertas') {
              el.click();
              clicouOutras = true;
            }
          });

          if (!clicouOutras) return;

          // Aguarda o submenu abrir e clica em "Ofertas para a minha igreja"
          setTimeout(() => {
            try {
              const retangulos = doc.querySelectorAll('span.rectangle-text');
              retangulos.forEach(el => {
                if (el.innerText.trim() === 'Ofertas para a minha igreja') {
                  el.click();
                }
              });
            } catch(e) {}
          }, 800);

          clearInterval(loop);

        } catch(e) {
          // CORS bloqueou — redireciona direto
          clearInterval(loop);
          window.location.href = URL_BASE;
        }

        if (tentativa >= MAX) {
          clearInterval(loop);
          window.location.href = URL_BASE;
        }
      }, 500);
    }
  </script>
</body>
</html>
